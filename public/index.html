<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PEGINTI v3.0</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay">

<header class="topbar">

<div class="brand">

<img src="assets/logo.jpg"
     alt="PEGINTI"
     class="logo-img">

<div class="brand-text">
<h1>PEGINTI</h1>
<p>IA Souveraine • TomTech.inc</p>
</div>

</div>

<button id="refreshBtn" class="icon-btn">⟳</button>

</header>


<section class="hero">

<h2>Analyse mondiale WOUNANET</h2>

<div class="search-row">

<input
id="wounanetMsg"
type="text"
placeholder="Sujet à analyser">

<button id="wounanetBtn">
WOUNANET
</button>

</div>

<div id="wounanetResponse"
class="result-card">

Résultat WOUNANET...

</div>

</section>


<section class="chat-card">

<h2>Assistant PEGINTI</h2>

<div id="response"
class="response-card">

Posez une question...

</div>

<div class="compose">

<input
id="msg"
type="text"
placeholder="Votre question">

<button id="sendBtn">
Envoyer
</button>

</div>

<div class="open-chat">

<button id="chatOpen">
💬 Ouvrir le chat
</button>

</div>

</section>


<div id="chatOverlay"
class="chat-overlay"
aria-hidden="true">

<div class="chat-window">

<div class="chat-header">

<span>Flux PEGINTI</span>

<button id="chatClose">
✕
</button>

</div>

<div id="chatFeed"
class="chat-feed"></div>

</div>

</div>


<footer>

PEGINTI v3.0 • Cloudflare Tunnel • HTTPS

</footer>

</div>

<script src="app.js"></script>

</body>
</html>

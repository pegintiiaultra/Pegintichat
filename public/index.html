<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PEGINTI v2.2 - TomTech.inc</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>
<body>
  <div class="app-shell">

    <!-- Barre supérieure -->
    <div class="topbar">
      <div class="brand">
        <img src="peginti-logo.png" alt="PEGINTI Logo" class="brand-logo">
        <div class="brand-text">
          <div class="brand-title">PEGINTI v2.2</div>
          <div class="brand-subtitle">IA Souveraine · TomTech.inc</div>
        </div>
      </div>
      <button id="refreshBtn" class="icon-btn">⟳</button>
    </div>

    <!-- Section WOUNANET -->
    <div class="hero">
      <div class="hero-title">La guerre au Moyen-Orient</div>
      <div class="hero-subtitle">Analyse externe via WOUNANET</div>
      <div class="search-row">
        <input id="wounanetMsg" class="search-input" placeholder="Sujet WOUNANET...">
        <button id="wounanetBtn" class="wounanet-btn">WOUNANET</button>
      </div>
    </div>

    <div id="wounanetResponse" class="response-panel">
      <div class="card empty">Résultat WOUNANET...</div>
    </div>

    <!-- Section Chat doctrinal -->
    <div class="chat-card">
      <div class="chat-header">Chat interactif</div>
      <div id="response" class="card empty">Réponse doctrinale...</div>
      <div class="chat-compose">
        <input id="msg" class="chat-input" placeholder="Écris ton message ici...">
        <button id="sendBtn" class="send-btn">Envoyer</button>
      </div>
      <div class="chat-open-row">
        <button id="chatOpen" class="chat-open-btn">💬 Ouvrir le chat</button>
      </div>
    </div>

    <!-- Overlay du chat -->
    <div id="chatOverlay" class="chat-overlay" aria-hidden="true">
      <div class="chat-overlay-card">
        <div class="chat-overlay-top">
          <span>Flux doctrinal PEGINTI</span>
          <button id="chatClose" class="close-btn">✕</button>
        </div>
        <div id="chatFeed" class="overlay-feed"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      PEGINTI v2.2 · Infrastructure TomTech.inc · Tunnel Cloudflare · HTTPS
    </div>
  </div>
</body>
</html>

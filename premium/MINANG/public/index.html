<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MINANG</title>
<script src="/socket.io/socket.io.js"></script>
</head>

<body>

<h2>MINANG Chat</h2>

<input id="user" placeholder="Votre nom">

<br><br>

<button onclick="enterRoom('gauche')">⬅️ GAUCHE</button>
<button onclick="enterRoom('droite')">➡️ DROITE</button>

<h3 id="roomLabel"></h3>

<div id="chat" style="border:1px solid #ccc;height:300px;overflow:auto;margin-top:10px;padding:10px"></div>

<input id="msg" placeholder="Votre message">
<button onclick="send()">Envoyer</button>

<script>

const socket = io()

let room = ""
let user = ""

function enterRoom(r){

room = r
user = document.getElementById("user").value || "visiteur"

document.getElementById("roomLabel").innerText = "Room : " + room

socket.emit("join", room)

}

function send(){

const text = document.getElementById("msg").value

if(!room){
alert("Choisir GAUCHE ou DROITE")
return
}

socket.emit("msg",{room,user,text})

document.getElementById("msg").value=""

}

socket.on("msg",(m)=>{

const div=document.createElement("div")

div.innerHTML=m.avatar+" <b>"+m.user+"</b>: "+m.text

document.getElementById("chat").appendChild(div)

})

</script>

</body>
</html>
